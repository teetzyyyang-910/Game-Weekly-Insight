  /* ── Header ── */
  .header {

    border-bottom: 1px solid var(--primary);
    padding: 28px 24px 20px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--primary), var(--accent), var(--primary), transparent);

  }
  @keyframes shimmer {

  }
  .header h1 {
    font-size: clamp(1.4rem, 4vw, 2rem);
    font-weight: 700;
    color: #fff;
    letter-spacing: 1px;
    text-shadow: 0 0 20px rgba(0, 212, 255, 0.5);

  .stats-row {

    margin-top: 16px;
    flex-wrap: wrap;
  }
  .stat-chip {
    background: rgba(0, 212, 255, 0.08);
    border: 1px solid rgba(0, 212, 255, 0.25);
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 0.8rem;
    color: var(--primary);

    display: flex;
    justify-content: center;
    gap: 4px;
    padding: 20px 16px 0;
    flex-wrap: wrap;
  }
  .tab-btn {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    color: var(--text-muted);
    padding: 10px 20px;
    border-radius: 8px 8px 0 0;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.25s ease;
    white-space: nowrap;
  }
  .tab-btn:hover {
    color: var(--primary);
    border-color: var(--primary);
  }
  .tab-btn.active {
    color: var(--primary);
    border-color: var(--primary);
    border-bottom-color: var(--bg);
    background: var(--bg);
    position: relative;
    z-index: 1;
  }

  /* ── Tab Panels ── */
  .tabs-wrapper {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 16px 48px;
  }
  .tab-panel {
    display: none;
    animation: fadeIn 0.3s ease;
  }
  .tab-panel.active { display: block; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .panel-header {
    border: 1px solid var(--primary);
    border-top: none;
    border-radius: 0 0 8px 8px;
    padding: 14px 20px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(0, 212, 255, 0.04);

    background: var(--primary);
    color: #0d1117;
    font-weight: 700;
    font-size: 0.8rem;
    padding: 2px 10px;
    border-radius: 12px;
  }
  .panel-title { color: var(--text); font-size: 0.9rem; }

  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 16px;
  }

  .card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 10px;
    padding: 18px;
    transition: all 0.25s ease;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .card:hover {
    border-color: var(--primary);
    box-shadow: 0 0 16px rgba(0, 212, 255, 0.18), 0 0 4px rgba(0, 212, 255, 0.1);
    transform: translateY(-2px);

    font-size: 0.95rem;
    line-height: 1.45;
    text-decoration: none;
    display: block;

    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

    background: rgba(123, 47, 247, 0.15);

    background: var(--tag-bg);
    border: 1px solid var(--tag-border);
    color: var(--primary);

    padding: 2px 8px;
    border-radius: 10px;

    background: var(--insight-bg);
    border-left: 3px solid var(--accent);
    border-radius: 0 6px 6px 0;
    padding: 8px 12px;
    font-size: 0.8rem;
    color: #d2b4fe;
    line-height: 1.5;

    content: "【PM 觀點】";
    font-weight: 700;
    color: #a855f7;
    display: block;
    margin-bottom: 3px;
    font-size: 0.72rem;
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
    font-size: 0.9rem;
    border: 1px dashed var(--card-border);
    border-radius: 10px;
  }
  .empty-state .icon { font-size: 2.5rem; margin-bottom: 12px; }

  /* ── Footer ── */
  .footer {
    text-align: center;
    padding: 24px;
    color: var(--text-muted);
    font-size: 0.75rem;
    border-top: 1px solid var(--card-border);
  }

  /* ── RWD ── */
  @media (max-width: 600px) {
    .header { padding: 20px 16px 16px; }
    .tabs-nav { gap: 2px; }
    .tab-btn { padding: 8px 14px; font-size: 0.82rem; }
    .cards-grid { grid-template-columns: 1fr; }
    .stats-row { gap: 10px; }
  }
</style>
</head>

// ── Render ────────────────────────────────────────────────

function renderCards(data, gridId) {
  const grid = document.getElementById(gridId);
  if (!data || data.length === 0) {
    grid.innerHTML = `
      <div class="empty-state" style="grid-column:1/-1">
        <div class="icon">⚠️</div>
        本次未取得資料，請手動確認網站
      </div>`;
    return;
  }
  grid.innerHTML = data.map(item => `
    <div class="card">
      <div class="card-title">
        <a href="${item.url}" target="_blank" rel="noopener">${item.title}</a>
      </div>
      <div class="card-meta">
        <span class="source-badge">${item.source}</span>
        <span class="date-badge">📅 ${item.date}</span>
      </div>
      <div class="tags-row">
        ${item.tags.map(t => `<span class="tag">${t}</span>`).join('')}
      </div>
      <div class="insight-box">${item.pm_insight}</div>
    </div>
  `).join('');
}

// ── Tab Switch ─────────────────────────────────────────────

function switchTab(tabId, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(tabId).classList.add('active');
  btn.classList.add('active');
}
