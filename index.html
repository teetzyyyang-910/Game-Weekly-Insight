<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VNG 遊戲產業情報中心</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card: #ffffff;
            --border: #e2e8f0;
            --text: #1e293b;
            --text2: #64748b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container { max-width: 900px; width: 100%; }
        header {
            border-bottom: 2px solid var(--border);
            padding-bottom: 1.2rem;
            margin-bottom: 2rem;
        }
        h1 {
            margin: 0 0 0.4rem;
            font-size: 1.8rem;
            letter-spacing: 1px;
            background: linear-gradient(90deg, #2563eb, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }
        .subtitle {
            font-size: 0.9rem;
            color: var(--text2);
        }
        .report-grid { display: grid; gap: 1rem; }
        .report-card {
            background: var(--card);
            border: 1px solid var(--border);
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            padding: 1.5rem;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.25s;
            text-decoration: none;
            color: var(--text);
        }
        .report-card:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(37, 99, 235, 0.12);
        }
        .report-date {
            font-weight: bold;
            font-family: monospace;
            font-size: 1.1rem;
            color: var(--text);
            margin-bottom: 4px;
        }
        .report-desc {
            font-size: 0.88rem;
            color: var(--text2);
        }
        .view-btn {
            background: var(--primary);
            color: #fff;
            padding: 0.5rem 1.1rem;
            border-radius: 7px;
            font-weight: 700;
            font-size: 0.8rem;
            white-space: nowrap;
            flex-shrink: 0;
        }
    </style>
</head>
<body>

</body>
